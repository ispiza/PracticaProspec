<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Ejecutivo - Sistema de Inteligencia Comercial</title>
    <!-- Cargamos Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-tr from-slate-950 via-blue-950 to-slate-950 min-h-screen flex items-center justify-center p-4">

    <!-- Tarjeta de Login Estilo Glassmorphism -->
    <div class="bg-slate-900/80 backdrop-blur-md border border-slate-800 w-full max-w-md p-8 rounded-3xl shadow-2xl">
        
        <!-- Encabezado -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white tracking-tight">Acceso Ejecutivo</h1>
            <p class="text-slate-400 text-sm mt-2">Ingrese sus credenciales para acceder al Sistema de Inteligencia Comercial</p>
        </div>

        <!-- Formulario de autenticación ejecutivo -->
        <form method="POST" action="">
            {% csrf_token %}
            
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-200 text-xs rounded-xl p-3 mb-4 text-center">
                {{ error }}
            </div>
            {% endif %}

            <!-- Campo Usuario -->
            <div class="mb-5">
                <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Usuario</label>
                <input type="text" id="username" name="username" placeholder="CEO" required
                    class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>

            <!-- Campo Contraseña -->
            <div class="mb-6">
                <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>

            <!-- Botón de Entrada -->
            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-medium py-3 px-4 rounded-xl transition shadow-lg shadow-blue-500/20 text-sm">
                Entrar al panel
            </button>
        </form>

        <!-- Pie de tarjeta -->
        <div class="text-center mt-6">
            <span class="text-xs text-slate-500 tracking-wide bg-slate-950/40 px-3 py-1.5 rounded-full border border-slate-800">
                Uso exclusivo para dirección y análisis ejecutivo.
            </span>
        </div>
    </div>

</body>
</html>

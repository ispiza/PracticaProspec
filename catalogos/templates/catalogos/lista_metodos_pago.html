<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Métodos de Pago</title>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-white mb-6">Métodos de pago</h1>
        <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-slate-900 border-b border-slate-800">
                    <tr>
                        <th class="px-6 py-4 text-xs uppercase text-slate-400">Nombre del Método</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                    {% for metodo in metodos %}
                    <tr class="hover:bg-slate-800/40 transition">
                        <td class="px-6 py-4 font-medium text-white">{{ metodo.nombre }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Mensual</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Reporte Mensual de Ventas</h1>
            <a href="/" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm">Volver al inicio</a>
        </header>

        <div class="bg-gray-800 rounded-lg shadow-lg p-6">
            {% if reportes %}
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-700 text-gray-400">
                            <th class="pb-3">Fecha</th>
                            <th class="pb-3">Venta</th>
                            <th class="pb-3">Monto</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in reportes %}
                        <tr class="border-b border-gray-700">
                            <td class="py-3">{{ item.fecha }}</td>
                            <td class="py-3">{{ item.nombre }}</td>
                            <td class="py-3">${{ item.monto }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            {% else %}
                <div class="text-center py-10 text-gray-400">
                    <p>No hay reportes disponibles para mostrar en este momento.</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>

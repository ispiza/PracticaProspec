{% extends 'base.html' %}

{% block title %}Lista de Mercado{% endblock %}

{% block content %}
<div class="p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-white">Lista de Mercado</h1>
        <button class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-semibold transition">
            + Agregar producto
        </button>
    </div>

    <!-- Contenedor de la lista -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Ejemplo de tarjeta -->
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl hover:border-emerald-500 transition">
            <h2 class="text-xl font-bold text-white mb-2">Leche descremada</h2>
            <p class="text-slate-400 text-sm mb-4">Ubicación: Pasillo 4 - Lácteos</p>
            <div class="flex justify-between items-center">
                <span class="text-emerald-400 font-bold">Cant: 2</span>
                <input type="checkbox" class="h-6 w-6 rounded border-slate-700 bg-slate-800 text-emerald-500 focus:ring-emerald-500">
            </div>
        </div>
    </div>
</div>
{% endblock %}
